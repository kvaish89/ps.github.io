<!DOCTYPE html>
<html>
<head>
    <title>Knock Knock!</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        #chatbox { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        input { width: 75%; padding: 8px; }
        button { width: 20%; padding: 8px; }
    </style>
</head>
<body>
    <h2>Knock Knock!</h2>
    <div id="chatbox"></div>
    <input type="text" id="userInput" placeholder="Type something...">
    <button onclick="sendMessage()">Send</button>
 
    <script>
        function sendMessage() {
            let input = document.getElementById("userInput").value.toLowerCase().trim();
            let chatbox = document.getElementById("chatbox");
            if(!input) return;
 
            chatbox.innerHTML += `<p><b>PS:</b> ${input}</p>`;
            let response = "I don't understand that phrase yet!";
 
            // Define your pre-programmed responses here
            if (lower(input) === "whos there" || lower(input) === "who's there" || lower(input) === "whos there?" || lower(input) === "who's there?") {
                response = "What When";
            } else if (lower(input) === "what when who" || lower(input) === "what when who?") {
                response = "Dinner, Friday, You and I";
            } else if (input === "secret phrase") {
                response = "You found the hidden easter egg!";
            }
 
            chatbox.innerHTML += `<p><b>KV:</b> ${response}</p>`;
            document.getElementById("userInput").value = "";
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>
</body>
</html>
