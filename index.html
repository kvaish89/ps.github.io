<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knock Knock!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #fbb1bd 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.1);
            width: 100%;
            max-width: 400px;
            height: 550px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h2 {
            text-align: center;
            color: #ff4d6d;
            padding: 20px;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Custom scrollbar for chatbox */
        #chatbox::-webkit-scrollbar {
            width: 6px;
        }
        #chatbox::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        /* Base Message styling */
        p {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Fixed: Style for User (PS) - Aligns to the RIGHT */
        p.ps-msg {
            align-self: flex-end;
            background-color: #ff4d6d;
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* Style for KV - Aligns to the LEFT */
        p.kv-msg {
            align-self: flex-start;
            background-color: #f0f2f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        /* Hiding the bold prefix tags because the bubble styles make it obvious who is talking */
        p b {
            display: none;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            gap: 10px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ffccd5;
            border-radius: 25px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #ff4d6d;
        }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #ff758f;
        }

        button:active {
            transform: scale(0.95);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Knock Knock! 💌</h2>
        <div id="chatbox"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your reply here..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
 
    <script>
        function sendMessage() {
            let input = document.getElementById("userInput").value.toLowerCase().trim();
            let chatbox = document.getElementById("chatbox");
            if(!input) return;
 
            // Keeps your exact output structure but correctly hooks into the right-align CSS
            chatbox.innerHTML += `<p class="ps-msg"><b>PS:</b> ${document.getElementById("userInput").value.trim()}</p>`;
            let response = "I don't understand that phrase yet!";
            
            if (input === "whos there" || input === "who's there" || input === "whos there?" || input === "who's there?") {
                response = "What When";
            } else if (input === "what when who" || input === "what when who?") {
                response = "Dinner, Pick a date, You and I";
            }
 
            chatbox.innerHTML += `<p class="kv-msg"><b>KV:</b> ${response}</p>`;
            document.getElementById("userInput").value = "";
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>
</body>
</html>
