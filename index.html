<!DOCTYPE html>
<html>
<head>
    <title>Fun Chatbot</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        #chatbox { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        input { width: 75%; padding: 8px; }
        button { width: 20%; padding: 8px; }
    </style>
</head>
<body>
    <h2>My Custom Chatbot</h2>
    <div id="chatbox"></div>
    <input type="text" id="userInput" placeholder="Type something...">
    <button onclick="sendMessage()">Send</button>
 
    <script>
        function sendMessage() {
            let input = document.getElementById("userInput").value.toLowerCase().trim();
            let chatbox = document.getElementById("chatbox");
            if(!input) return;
 
            chatbox.innerHTML += `<p><b>You:</b> ${input}</p>`;
            let response = "I don't understand that phrase yet!";
 
            // Define your pre-programmed responses here
            if (input === "hello" || input === "hi") {
                response = "Well, hello there friend!";
            } else if (input === "tell me a joke") {
                response = "Why don't scientists trust atoms? Because they make up everything!";
            } else if (input === "secret phrase") {
                response = "You found the hidden easter egg!";
            }
 
            chatbox.innerHTML += `<p><b>Bot:</b> ${response}</p>`;
            document.getElementById("userInput").value = "";
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>
</body>
</html>
